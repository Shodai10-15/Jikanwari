<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間割作成ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem}
.container{max-width:720px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a}
.section{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.section-title{font-size:14px;font-weight:500;color:#666;margin-bottom:0.75rem}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.label{font-size:13px;color:#666;min-width:110px}
input[type=number],input[type=text],select{height:32px;font-size:13px;padding:0 8px;border-radius:8px;border:0.5px solid #ccc;background:#f8f8f6;color:#1a1a1a;width:80px}
input[type=text]{width:110px}
input:focus,select:focus{outline:2px solid #4a90d9;outline-offset:1px}
.btn{height:34px;padding:0 16px;font-size:13px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.15s}
.btn:hover{background:#f0ede8}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sm{height:26px;padding:0 10px;font-size:12px}
.btn-danger{color:#c0392b;border-color:#e0b0ad}
.btn-danger:hover{background:#fdf0ef}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 18px;border-radius:100px;font-size:13px;border:0.5px solid #ddd;cursor:pointer;background:#fff;color:#666;transition:all 0.15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.teacher-card{background:#f8f8f6;border-radius:8px;padding:0.75rem 1rem;margin-bottom:8px;border:0.5px solid #e5e5e0}
.teacher-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sub-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.sub-label{font-size:12px;color:#888;min-width:120px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;padding:3px 12px;border-radius:100px;font-size:12px;cursor:pointer;user-select:none;border:0.5px solid #ccc;color:#666;background:#fff;transition:all 0.15s}
.chip.on{background:#e8f0fb;color:#1a56c4;border-color:#aac4f0}
.day-chip{display:inline-flex;align-items:center;padding:4px 14px;border-radius:100px;font-size:13px;cursor:pointer;user-select:none;border:0.5px solid #ccc;color:#666;background:#fff;transition:all 0.15s}
.day-chip.on{background:#eaf4e8;color:#2a7a2a;border-color:#90c890}
.timetable-wrap{overflow-x:auto;margin-bottom:1.25rem}
table.tt{border-collapse:collapse;min-width:200px}
table.tt th,table.tt td{border:0.5px solid #ddd;padding:5px 7px;font-size:12px;text-align:center;min-width:60px}
table.tt th{background:#f5f5f3;font-weight:500;color:#666}
.cell-filled{background:#e8f0fb;color:#1a56c4;border-radius:4px;padding:3px 5px;font-size:11px;line-height:1.5}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.75rem}
.stat{background:#f5f5f3;border-radius:8px;padding:8px 14px;font-size:12px;color:#888}
.stat strong{display:block;font-size:22px;font-weight:500;color:#1a1a1a}
.warn-box{background:#fff8e8;border:0.5px solid #f0c040;border-radius:8px;padding:0.5rem 0.75rem;font-size:12px;color:#a07010;margin-bottom:0.75rem}
.load-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.load-bar-bg{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.load-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-ok{background:#eaf4e8;color:#2a7a2a}
.badge-warn{background:#fff3cd;color:#856404}
.badge-err{background:#fdf0ef;color:#c0392b}
.day-note{font-size:12px;color:#888;margin-top:4px;margin-left:118px}
@media print{
  body{background:#fff;padding:0}
  .tabs,.btn,.no-print{display:none!important}
  .section{border:none;padding:0;margin-bottom:0.5rem}
  table.tt th,table.tt td{padding:3px 5px}
}
</style>
</head>
<body>
<div class="container">
<h1>時間割作成ツール</h1>

<div class="tabs">
  <button class="tab active" onclick="showTab('setup')">設定</button>
  <button class="tab" onclick="showTab('teachers')">先生の設定</button>
  <button class="tab" onclick="showTab('result')">時間割</button>
</div>

<!-- TAB: setup -->
<div id="pane-setup">
  <div class="section">
    <div class="section-title">基本設定</div>
    <div class="row">
      <span class="label">クラス数</span>
      <input type="number" id="num-classes" value="3" min="1" max="10">
      <span style="font-size:13px;color:#888">クラス</span>
    </div>
    <div class="row">
      <span class="label">1日の時限数</span>
      <input type="number" id="num-periods" value="6" min="1" max="8">
      <span style="font-size:13px;color:#888">時限</span>
    </div>
    <div class="row" style="align-items:flex-start">
      <span class="label" style="padding-top:5px">使用する曜日</span>
      <div class="chip-wrap" id="day-chips"></div>
    </div>
    <div class="day-note" id="day-count-note"></div>
  </div>
  <div class="section">
    <div class="section-title">クラス名</div>
    <div id="class-names-wrap"></div>
    <button class="btn btn-sm no-print" onclick="renderClassNameInputs()" style="margin-top:6px">クラス数を反映</button>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button class="btn btn-primary" onclick="applyClassNames();showTab('teachers')">次へ：先生の設定 →</button>
  </div>
</div>

<!-- TAB: teachers -->
<div id="pane-teachers" style="display:none">
  <div class="section">
    <div class="section-title">先生の設定</div>
    <div id="teachers-wrap"></div>
    <button class="btn no-print" onclick="addTeacher()" style="margin-top:8px">＋ 先生を追加</button>
  </div>
  <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:1rem">
    <button class="btn" onclick="showTab('setup')">← 戻る</button>
    <button class="btn btn-primary" onclick="generate()">時間割を作成</button>
  </div>
</div>

<!-- TAB: result -->
<div id="pane-result" style="display:none">
  <div id="result-inner">
    <p style="font-size:13px;color:#888">「先生の設定」タブで時間割を作成してください。</p>
  </div>
</div>

</div><!-- /container -->

<script>
var ALL_DAYS=['月','火','水','木','金','土','日'];
var selectedDays=[true,true,true,true,true,false,false];
var classNames=['1組','2組','3組'];
var teachers=[];
var lastResult=null;

function showTab(t){
  ['setup','teachers','result'].forEach(function(id){
    document.getElementById('pane-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(function(el,i){
    el.classList.toggle('active',['setup','teachers','result'][i]===t);
  });
}

function renderDayChips(){
  var wrap=document.getElementById('day-chips');
  wrap.innerHTML='';
  ALL_DAYS.forEach(function(d,i){
    var span=document.createElement('span');
    span.className='day-chip'+(selectedDays[i]?' on':'');
    span.textContent=d;
    span.onclick=function(){
      var onCount=selectedDays.filter(Boolean).length;
      if(selectedDays[i]&&onCount<=1)return;
      selectedDays[i]=!selectedDays[i];
      renderDayChips();
    };
    wrap.appendChild(span);
  });
  var count=selectedDays.filter(Boolean).length;
  document.getElementById('day-count-note').textContent=count+'日間を使用中';
}

function getActiveDays(){
  return ALL_DAYS.filter(function(d,i){return selectedDays[i];});
}

function renderClassNameInputs(){
  var n=parseInt(document.getElementById('num-classes').value)||3;
  while(classNames.length<n) classNames.push((classNames.length+1)+'組');
  classNames=classNames.slice(0,n);
  var wrap=document.getElementById('class-names-wrap');
  wrap.innerHTML='';
  classNames.forEach(function(name,i){
    var row=document.createElement('div');
    row.className='row';
    row.innerHTML='<span class="label">'+(i+1)+'番目</span><input type="text" id="cname-'+i+'" value="'+name+'">';
    wrap.appendChild(row);
  });
}

function applyClassNames(){
  var n=parseInt(document.getElementById('num-classes').value)||3;
  classNames=[];
  for(var i=0;i<n;i++){
    var el=document.getElementById('cname-'+i);
    classNames.push(el?el.value:(i+1)+'組');
  }
  teachers.forEach(function(t){
    t.classes=t.classes.filter(function(c){return classNames.indexOf(c)>=0;});
    if(!t.classes.length) t.classes=classNames.slice();
  });
  renderTeachers();
}

function addTeacher(){
  teachers.push({name:'先生'+(teachers.length+1),subject:'英語',maxLessons:10,lessonsPerClass:2,classes:classNames.slice()});
  renderTeachers();
}

function removeTeacher(i){
  teachers.splice(i,1);
  renderTeachers();
}

function toggleClass(ti,cls){
  var t=teachers[ti];
  var idx=t.classes.indexOf(cls);
  if(idx>=0) t.classes.splice(idx,1);
  else t.classes.push(cls);
  renderTeachers();
}

function renderTeachers(){
  var wrap=document.getElementById('teachers-wrap');
  wrap.innerHTML='';
  if(!teachers.length){
    wrap.innerHTML='<p style="font-size:13px;color:#888">先生を追加してください。</p>';
    return;
  }
  teachers.forEach(function(t,i){
    var card=document.createElement('div');
    card.className='teacher-card';
    var chips=classNames.map(function(c){
      var on=t.classes.indexOf(c)>=0;
      return '<span class="chip'+(on?' on':'')+'" onclick="toggleClass('+i+',\''+c+'\')">'+c+'</span>';
    }).join('');
    card.innerHTML=
      '<div class="teacher-header">'+
        '<input type="text" value="'+t.name+'" onchange="teachers['+i+'].name=this.value" style="width:100px;font-weight:500">'+
        '<input type="text" value="'+t.subject+'" onchange="teachers['+i+'].subject=this.value" placeholder="教科" style="width:80px">'+
        '<button class="btn btn-danger btn-sm no-print" onclick="removeTeacher('+i+')" style="margin-left:auto">削除</button>'+
      '</div>'+
      '<div class="sub-row">'+
        '<span class="sub-label">最大担当時間（週）</span>'+
        '<input type="number" value="'+t.maxLessons+'" min="1" max="60" style="width:60px" onchange="teachers['+i+'].maxLessons=parseInt(this.value)||1">'+
        '<span style="font-size:12px;color:#888">時間</span>'+
      '</div>'+
      '<div class="sub-row">'+
        '<span class="sub-label">クラスあたり授業数</span>'+
        '<input type="number" value="'+t.lessonsPerClass+'" min="1" max="10" style="width:60px" onchange="teachers['+i+'].lessonsPerClass=parseInt(this.value)||1">'+
        '<span style="font-size:12px;color:#888">時間／週</span>'+
      '</div>'+
      '<div class="sub-row">'+
        '<span class="sub-label">担当クラス</span>'+
        '<div class="chip-wrap">'+chips+'</div>'+
      '</div>';
    wrap.appendChild(card);
  });
}

function generate(){
  var activeDays=getActiveDays();
  var numDays=activeDays.length;
  var numPeriods=parseInt(document.getElementById('num-periods').value)||6;

  var timetable={};
  classNames.forEach(function(cls){
    timetable[cls]=[];
    for(var d=0;d<numDays;d++){
      var row=[];
      for(var p=0;p<numPeriods;p++) row.push(null);
      timetable[cls].push(row);
    }
  });

  var teacherLoad={};
  var teacherSlotUsed={};
  teachers.forEach(function(t){teacherLoad[t.name]=0;teacherSlotUsed[t.name]={};});

  var reqs=[];
  teachers.forEach(function(t){
    t.classes.forEach(function(cls){
      for(var n=0;n<t.lessonsPerClass;n++) reqs.push({t:t,cls:cls});
    });
  });
  for(var i=reqs.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=reqs[i];reqs[i]=reqs[j];reqs[j]=tmp;
  }

  var placed=0,failed=0;
  reqs.forEach(function(req){
    var t=req.t,cls=req.cls;
    if(teacherLoad[t.name]>=t.maxLessons){failed++;return;}
    var avail=[];
    for(var d=0;d<numDays;d++){
      for(var p=0;p<numPeriods;p++){
        if(timetable[cls][d][p]!==null) continue;
        if(teacherSlotUsed[t.name][d+'-'+p]) continue;
        avail.push([d,p]);
      }
    }
    if(!avail.length){failed++;return;}
    var pick=avail[Math.floor(Math.random()*avail.length)];
    timetable[cls][pick[0]][pick[1]]={teacher:t.name,subject:t.subject};
    teacherSlotUsed[t.name][pick[0]+'-'+pick[1]]=true;
    teacherLoad[t.name]++;
    placed++;
  });

  lastResult={timetable:timetable,activeDays:activeDays,numDays:numDays,numPeriods:numPeriods,teacherLoad:teacherLoad,placed:placed,failed:failed};
  showTab('result');
  renderResult();
}

function renderResult(){
  var el=document.getElementById('result-inner');
  if(!lastResult){el.innerHTML='<p style="font-size:13px;color:#888">先に時間割を作成してください。</p>';return;}
  var r=lastResult;
  var timetable=r.timetable,activeDays=r.activeDays,numDays=r.numDays,numPeriods=r.numPeriods,teacherLoad=r.teacherLoad;

  var emptyCount=0;
  classNames.forEach(function(cls){
    for(var d=0;d<numDays;d++)
      for(var p=0;p<numPeriods;p++)
        if(!timetable[cls][d][p]) emptyCount++;
  });

  var html='<div class="stats">'+
    '<div class="stat"><strong>'+r.placed+'</strong>配置済み授業</div>'+
    '<div class="stat"><strong>'+r.failed+'</strong><span style="color:#c0392b">未配置</span></div>'+
    '<div class="stat"><strong>'+emptyCount+'</strong>空きコマ</div>'+
    '<div class="stat"><strong>'+numDays+'日×'+numPeriods+'限</strong>週あたり</div>'+
  '</div>';

  if(r.failed>0) html+='<div class="warn-box">⚠ '+r.failed+'件が配置できませんでした。最大担当時間数を増やすか、担当クラスの設定を確認してください。</div>';

  classNames.forEach(function(cls){
    html+='<div style="margin-bottom:1.25rem"><div style="font-size:14px;font-weight:500;margin-bottom:6px">'+cls+'</div><div class="timetable-wrap"><table class="tt"><thead><tr><th>時限</th>';
    activeDays.forEach(function(d){html+='<th>'+d+'</th>';});
    html+='</tr></thead><tbody>';
    for(var p=0;p<numPeriods;p++){
      html+='<tr><th>'+(p+1)+'限</th>';
      for(var d=0;d<numDays;d++){
        var cell=timetable[cls][d][p];
        if(cell) html+='<td><div class="cell-filled">'+cell.subject+'<br><span style="font-size:10px;opacity:0.75">'+cell.teacher+'</span></div></td>';
        else html+='<td><span style="color:#bbb;font-size:11px">—</span></td>';
      }
      html+='</tr>';
    }
    html+='</tbody></table></div></div>';
  });

  html+='<div class="section"><div class="section-title">先生別 担当数</div>';
  teachers.forEach(function(t){
    var load=teacherLoad[t.name]||0;
    var pct=Math.min(Math.round(load/t.maxLessons*100),100);
    var color=pct>=100?'err':pct>=80?'warn':'ok';
    var barColor=color==='ok'?'#3a9a3a':color==='warn'?'#c09020':'#c0392b';
    html+='<div class="load-bar-wrap">'+
      '<span style="font-size:13px;min-width:80px">'+t.name+'</span>'+
      '<div class="load-bar-bg"><div class="load-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'+
      '<span class="badge badge-'+color+'" style="margin-left:6px">'+load+' / '+t.maxLessons+'時間</span>'+
    '</div>';
  });
  html+='</div>';

  html+='<div class="no-print" style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">'+
    '<button class="btn" onclick="window.print()">印刷</button>'+
    '<button class="btn" onclick="generate()">再生成</button>'+
    '<button class="btn" onclick="showTab(\'teachers\')">← 設定を変更</button>'+
  '</div>';

  el.innerHTML=html;
}

renderDayChips();
renderClassNameInputs();
addTeacher();
addTeacher();
</script>
</body>
</html>
